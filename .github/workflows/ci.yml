name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guard:
    name: Public Tree Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run leak guard
        run: python scripts/verify_public_tree.py .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -v

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [guard, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tool
        run: pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify dist artifacts
        run: |
          ls -la dist/
          python -c "import glob; assert glob.glob('dist/*.whl'), 'no wheel produced'"
          python -c "import glob; assert glob.glob('dist/*.tar.gz'), 'no sdist produced'"